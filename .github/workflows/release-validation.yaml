# RC Release Validation - Run full E2E suite on Kind + HyperShift
# Triggered manually to validate an RC before GA promotion.
# See: https://github.com/kagenti/kagenti/issues/1723
name: RC Release Validation

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to validate (e.g., v0.6.0-rc.9, main, feature-branch)'
        required: true
      ocp_version:
        description: 'OpenShift version for HyperShift'
        required: false
        default: '4.20.21'
      skip_kind:
        description: 'Skip Kind E2E tests'
        required: false
        type: boolean
        default: false
      skip_hypershift:
        description: 'Skip HyperShift E2E tests'
        required: false
        type: boolean
        default: false
      skip_destroy:
        description: 'Skip HyperShift cluster destruction (for debugging)'
        required: false
        type: boolean
        default: false
      dep_builds:
        description: 'JSON array of dependency builds (used by both Kind and HyperShift), e.g. [{"repo":"kagenti/kagenti-extensions","ref":"v0.6.0-rc.1"}]. Kind uses the kagenti-extensions ref for weather-agent deploy; HyperShift passes the full array to the deploy script.'
        required: false
        default: '[]'

concurrency:
  group: release-validation-${{ github.event.inputs.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  K8S_VERSION: '1.35.0'
  OCP_VERSION: ${{ inputs.ocp_version || '4.20.21' }}

jobs:
  # ============================================================================
  # Preflight - Validate inputs and resolve ref
  # ============================================================================
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      ref: ${{ steps.resolve.outputs.ref }}
      short_ref: ${{ steps.resolve.outputs.short_ref }}
      cluster_suffix: ${{ steps.resolve.outputs.cluster_suffix }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 1

      - name: Resolve ref and generate cluster suffix
        id: resolve
        run: |
          REF="${{ inputs.ref }}"
          SHA=$(git rev-parse --short HEAD)
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"

          # Short ref for display (strip v prefix for tags)
          SHORT_REF="${REF#v}"
          echo "short_ref=${SHORT_REF}" >> "$GITHUB_OUTPUT"

          # Cluster suffix: use sanitized ref (rc tags become e.g. "rc9")
          if [[ "$REF" =~ -rc\.([0-9]+)$ ]]; then
            SUFFIX="rc${BASH_REMATCH[1]}"
          else
            SUFFIX="val${SHA}"
          fi
          echo "cluster_suffix=${SUFFIX}" >> "$GITHUB_OUTPUT"

          echo "## Preflight" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Ref:** \`${REF}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **SHA:** \`${SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Cluster suffix:** \`${SUFFIX}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Kind:** ${{ inputs.skip_kind && 'SKIPPED' || 'enabled' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **HyperShift:** ${{ inputs.skip_hypershift && 'SKIPPED' || 'enabled' }}" >> "$GITHUB_STEP_SUMMARY"

  # ============================================================================
  # Kind E2E - Full test suite on Kind cluster
  # ============================================================================
  e2e-kind:
    name: Kind E2E
    needs: [preflight]
    if: ${{ !inputs.skip_kind }}
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - name: Install kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d  # v5.1.0

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0
        with:
          version: 'v3.17.0'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Free up disk space
        run: bash .github/scripts/common/05-free-disk-space.sh

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5

      - name: Install dependencies (jq)
        run: sudo apt-get update -qq && sudo apt-get install -y jq

      - name: Create secrets for bash installer
        run: bash .github/scripts/common/20-create-secrets-bash.sh

      - name: Install Kagenti platform (bash installer)
        run: bash scripts/kind/setup-kagenti.sh --with-all --build-images

      - name: Wait for platform and reduce Kuadrant resources
        run: bash .github/scripts/common/40-wait-platform-ready.sh

      - name: Install Ollama
        run: bash .github/scripts/common/50-install-ollama.sh

      - name: Start Ollama and pull model
        run: bash .github/scripts/common/60-pull-ollama-model.sh

      - name: Configure dockerhost service
        run: bash .github/scripts/common/70-configure-dockerhost.sh

      - name: Wait for kagenti-operator CRDs
        run: bash .github/scripts/kagenti-operator/41-wait-crds.sh

      - name: Build weather-tool image
        run: bash .github/scripts/kagenti-operator/71-build-weather-tool.sh

      - name: Deploy weather-tool via Deployment + Service
        run: bash .github/scripts/kagenti-operator/72-deploy-weather-tool.sh

      - name: Resolve extensions git ref from dep_builds
        id: resolve-deps
        run: |
          EXTENSIONS_REF="${{ inputs.ref }}"
          DEP_BUILDS='${{ inputs.dep_builds }}'
          if [ "$DEP_BUILDS" != "[]" ] && [ -n "$DEP_BUILDS" ]; then
            REF=$(echo "$DEP_BUILDS" | jq -r '.[] | select(.repo == "kagenti/kagenti-extensions") | .ref // empty')
            if [ -n "$REF" ]; then
              EXTENSIONS_REF="$REF"
            fi
          fi
          echo "extensions_ref=${EXTENSIONS_REF}" >> "$GITHUB_OUTPUT"
          echo "Using kagenti-extensions ref: ${EXTENSIONS_REF}"

      - name: Deploy weather-service agent
        run: bash .github/scripts/kagenti-operator/74-deploy-weather-agent.sh
        env:
          KAGENTI_EXTENSIONS_GIT_REF: ${{ steps.resolve-deps.outputs.extensions_ref }}

      - name: Install test dependencies
        run: bash .github/scripts/common/80-install-test-deps.sh

      - name: Start port-forward for agent service
        run: bash .github/scripts/common/85-start-port-forward.sh

      - name: Setup test credentials
        run: bash .github/scripts/common/87-setup-test-credentials.sh

      - name: Pre-flight checks
        run: bash .github/scripts/common/90-preflight-checks.sh

      - name: Run backend E2E tests
        run: bash .github/scripts/kagenti-operator/90-run-e2e-tests.sh
        env:
          KAGENTI_CONFIG_FILE: deployments/envs/dev_values.yaml
          AGENT_URL: http://localhost:8000
          PLATFORM: kind

      - name: Setup Keycloak for token exchange
        if: success()
        run: |
          bash .github/scripts/token-exchange/35-install-keycloak-ocp.sh community
          bash .github/scripts/token-exchange/40-setup-keycloak-realm.sh
          bash .github/scripts/token-exchange/50-enable-kagenti-ns.sh
          bash .github/scripts/token-exchange/55-setup-spiffe-idp.sh
          bash .github/scripts/token-exchange/70-deploy-test-workloads.sh
          bash .github/scripts/token-exchange/56-enable-spiffe.sh
          bash .github/scripts/token-exchange/60-configure-fgap.sh

      - name: Wait for token exchange workloads
        if: success()
        run: |
          sleep 30
          kubectl rollout status deployment/tx-e2e-agent -n tx-e2e --timeout=300s || true
          kubectl rollout status deployment/tx-e2e-tool -n tx-e2e --timeout=300s || true
          for i in $(seq 1 30); do
            CREDS=$(kubectl get secrets -n tx-e2e -o name | grep -c kagenti-keycloak-client-credentials || echo "0")
            [ "$CREDS" -ge 2 ] && echo "Credentials ready ($CREDS)" && break
            echo "Waiting for credentials ($CREDS/2)..."
            sleep 10
          done

      - name: Run token exchange E2E tests (community KC — fatal)
        if: success()
        run: bash .github/scripts/token-exchange/80-run-tests.sh
        env:
          KEYCLOAK_PROVIDER: community
          PLATFORM: kind

      - name: Run UI E2E tests
        if: success()
        run: bash .github/scripts/common/92-run-ui-tests.sh

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: kind-e2e-results
          path: |
            kagenti/tests/e2e/results/
            kagenti/ui-v2/playwright-report/
          retention-days: 30

      - name: Collect logs on failure
        if: failure()
        run: bash .github/scripts/common/99-collect-logs.sh || true

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: kind-failure-logs
          path: /tmp/kagenti-logs/
          retention-days: 14

  # ============================================================================
  # HyperShift E2E - Full test suite on OCP cluster
  # ============================================================================
  e2e-hypershift:
    name: HyperShift E2E
    needs: [preflight]
    if: ${{ !inputs.skip_hypershift }}
    runs-on: ubuntu-latest
    timeout-minutes: 120

    outputs:
      slot_id: ${{ steps.acquire-slot.outputs.slot_id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ inputs.ref }}

      - name: Validate secrets are configured
        run: bash .github/scripts/hypershift/ci/00-validate-secrets.sh
        env:
          HYPERSHIFT_MGMT_KUBECONFIG: ${{ secrets.HYPERSHIFT_MGMT_KUBECONFIG }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          PULL_SECRET: ${{ secrets.PULL_SECRET }}
          BASE_DOMAIN: ${{ secrets.BASE_DOMAIN }}
          MANAGED_BY_TAG: ${{ secrets.MANAGED_BY_TAG }}
          HCP_ROLE_NAME: ${{ secrets.HCP_ROLE_NAME }}

      - name: Setup credentials
        run: bash .github/scripts/hypershift/ci/10-setup-credentials.sh
        env:
          HYPERSHIFT_MGMT_KUBECONFIG: ${{ secrets.HYPERSHIFT_MGMT_KUBECONFIG }}
          MANAGED_BY_TAG: ${{ secrets.MANAGED_BY_TAG }}
          PULL_SECRET: ${{ secrets.PULL_SECRET }}

      - name: Install tools
        run: bash .github/scripts/hypershift/ci/20-install-tools.sh
        env:
          OCP_VERSION: ${{ env.OCP_VERSION }}

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: '1.24'
          cache: false

      - name: Build hcp CLI from source
        run: bash .github/scripts/hypershift/ci/30-build-hcp-cli.sh

      - name: Clone hypershift-automation
        run: bash .github/scripts/hypershift/ci/40-clone-hypershift-automation.sh

      - name: Verify management cluster access
        run: bash .github/scripts/hypershift/ci/50-verify-mgmt-access.sh

      - name: Cleanup stale CI slots
        run: bash .github/scripts/hypershift/ci/slots/cleanup-stale.sh

      - name: Acquire CI slot
        id: acquire-slot
        run: bash .github/scripts/hypershift/ci/slots/acquire.sh

      - name: Check slot capacity
        run: bash .github/scripts/hypershift/ci/slots/check-capacity.sh
        env:
          SLOT_ID: ${{ steps.acquire-slot.outputs.slot_id }}

      - name: Cleanup existing cluster (from cancelled runs)
        run: bash .github/scripts/hypershift/ci/55-cleanup-existing-cluster.sh
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          MANAGED_BY_TAG: ${{ secrets.MANAGED_BY_TAG }}
          HCP_ROLE_NAME: ${{ secrets.HCP_ROLE_NAME }}
          CLUSTER_SUFFIX: ${{ needs.preflight.outputs.cluster_suffix }}

      - name: Create HyperShift cluster
        id: create-cluster
        run: bash .github/scripts/hypershift/create-cluster.sh
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          PULL_SECRET: ${{ secrets.PULL_SECRET }}
          BASE_DOMAIN: ${{ secrets.BASE_DOMAIN }}
          MANAGED_BY_TAG: ${{ secrets.MANAGED_BY_TAG }}
          HCP_ROLE_NAME: ${{ secrets.HCP_ROLE_NAME }}
          CLUSTER_SUFFIX: ${{ needs.preflight.outputs.cluster_suffix }}
          OCP_VERSION: ${{ env.OCP_VERSION }}

      - name: Deploy Kagenti platform
        run: bash .github/scripts/hypershift/ci/70-deploy-kagenti.sh
        env:
          KUBECONFIG: ${{ steps.create-cluster.outputs.cluster_kubeconfig }}
          KAGENTI_DEP_BUILDS: ${{ inputs.dep_builds }}

      - name: Build platform images
        run: bash .github/scripts/common/26-build-platform-images.sh
        env:
          KUBECONFIG: ${{ steps.create-cluster.outputs.cluster_kubeconfig }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5

      - name: Pre-flight checks
        run: bash .github/scripts/common/90-preflight-checks.sh
        env:
          KUBECONFIG: ${{ steps.create-cluster.outputs.cluster_kubeconfig }}

      - name: Run backend E2E tests
        run: bash .github/scripts/hypershift/ci/80-run-e2e-tests.sh
        env:
          KUBECONFIG: ${{ steps.create-cluster.outputs.cluster_kubeconfig }}
          KAGENTI_CONFIG_FILE: deployments/envs/ocp_ci_values.yaml
          PLATFORM: ocp

      - name: Setup Keycloak for token exchange
        if: success()
        run: |
          bash .github/scripts/token-exchange/35-install-keycloak-ocp.sh community
          bash .github/scripts/token-exchange/40-setup-keycloak-realm.sh
          bash .github/scripts/token-exchange/50-enable-kagenti-ns.sh
          bash .github/scripts/token-exchange/55-setup-spiffe-idp.sh
          bash .github/scripts/token-exchange/70-deploy-test-workloads.sh
          bash .github/scripts/token-exchange/56-enable-spiffe.sh
          bash .github/scripts/token-exchange/60-configure-fgap.sh
        env:
          KUBECONFIG: ${{ steps.create-cluster.outputs.cluster_kubeconfig }}

      - name: Wait for token exchange workloads
        if: success()
        run: |
          sleep 30
          kubectl rollout status deployment/tx-e2e-agent -n tx-e2e --timeout=300s || true
          kubectl rollout status deployment/tx-e2e-tool -n tx-e2e --timeout=300s || true
          for i in $(seq 1 30); do
            CREDS=$(kubectl get secrets -n tx-e2e -o name | grep -c kagenti-keycloak-client-credentials || echo "0")
            [ "$CREDS" -ge 2 ] && echo "Credentials ready ($CREDS)" && break
            echo "Waiting for credentials ($CREDS/2)..."
            sleep 10
          done
        env:
          KUBECONFIG: ${{ steps.create-cluster.outputs.cluster_kubeconfig }}

      - name: Run token exchange E2E tests (community KC — fatal)
        if: success()
        run: bash .github/scripts/token-exchange/80-run-tests.sh
        env:
          KUBECONFIG: ${{ steps.create-cluster.outputs.cluster_kubeconfig }}
          KEYCLOAK_PROVIDER: community
          PLATFORM: ocp

      - name: Install RHBK and re-run token exchange tests (non-fatal)
        if: success()
        continue-on-error: true
        run: |
          kubectl delete namespace tx-e2e --ignore-not-found --timeout=60s || true
          sleep 10
          bash .github/scripts/token-exchange/35-install-keycloak-ocp.sh rhbk
          bash .github/scripts/token-exchange/40-setup-keycloak-realm.sh
          bash .github/scripts/token-exchange/50-enable-kagenti-ns.sh
          bash .github/scripts/token-exchange/55-setup-spiffe-idp.sh
          bash .github/scripts/token-exchange/70-deploy-test-workloads.sh
          bash .github/scripts/token-exchange/56-enable-spiffe.sh
          bash .github/scripts/token-exchange/60-configure-fgap.sh
          sleep 30
          kubectl rollout status deployment/tx-e2e-agent -n tx-e2e --timeout=300s || true
          kubectl rollout status deployment/tx-e2e-tool -n tx-e2e --timeout=300s || true
          bash .github/scripts/token-exchange/80-run-tests.sh
        env:
          KUBECONFIG: ${{ steps.create-cluster.outputs.cluster_kubeconfig }}
          KEYCLOAK_PROVIDER: rhbk
          PLATFORM: ocp
          FORCE: "true"

      - name: Run UI E2E tests
        if: success()
        run: bash .github/scripts/common/92-run-ui-tests.sh
        env:
          KUBECONFIG: ${{ steps.create-cluster.outputs.cluster_kubeconfig }}

      - name: Run Trivy Kubernetes cluster scan
        if: success()
        continue-on-error: true
        env:
          KUBECONFIG: ${{ steps.create-cluster.outputs.cluster_kubeconfig }}
          TRIVY_VERSION: '0.70.0'
        run: |
          curl -sfL -o trivy.tar.gz "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          tar xzf trivy.tar.gz trivy
          sudo mv trivy /usr/local/bin/
          rm trivy.tar.gz
          trivy k8s --kubeconfig "$KUBECONFIG" \
            --include-namespaces kagenti-system \
            --severity HIGH,CRITICAL \
            --report summary \
            --timeout 10m || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: hypershift-e2e-results
          path: |
            kagenti/tests/e2e/results/
            kagenti/ui-v2/playwright-report/
          retention-days: 30

      - name: Collect cluster info on failure
        if: failure()
        run: bash .github/scripts/hypershift/ci/85-collect-failure-info.sh
        env:
          KUBECONFIG: ${{ steps.create-cluster.outputs.cluster_kubeconfig }}

  # ============================================================================
  # Cleanup - Destroy HyperShift cluster and release slot
  # ============================================================================
  hypershift-cleanup:
    name: HyperShift Cleanup
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [preflight, e2e-hypershift]
    if: always() && !inputs.skip_hypershift && !inputs.skip_destroy

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ inputs.ref }}

      - name: Setup credentials
        run: bash .github/scripts/hypershift/ci/10-setup-credentials.sh
        env:
          HYPERSHIFT_MGMT_KUBECONFIG: ${{ secrets.HYPERSHIFT_MGMT_KUBECONFIG }}
          MANAGED_BY_TAG: ${{ secrets.MANAGED_BY_TAG }}
          PULL_SECRET: ${{ secrets.PULL_SECRET }}

      - name: Install tools
        run: bash .github/scripts/hypershift/ci/20-install-tools.sh
        env:
          OCP_VERSION: ${{ env.OCP_VERSION }}

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: '1.24'
          cache: false

      - name: Build hcp CLI from source
        run: bash .github/scripts/hypershift/ci/30-build-hcp-cli.sh

      - name: Clone hypershift-automation
        run: bash .github/scripts/hypershift/ci/40-clone-hypershift-automation.sh

      - name: Destroy HyperShift cluster
        run: bash .github/scripts/hypershift/ci/55-cleanup-existing-cluster.sh
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          MANAGED_BY_TAG: ${{ secrets.MANAGED_BY_TAG }}
          HCP_ROLE_NAME: ${{ secrets.HCP_ROLE_NAME }}
          CLUSTER_SUFFIX: ${{ needs.preflight.outputs.cluster_suffix }}

      - name: Release CI slot
        if: always()
        run: bash .github/scripts/hypershift/ci/slots/release.sh "${{ needs.e2e-hypershift.outputs.slot_id }}"

  # ============================================================================
  # Report - Combined status from all test jobs
  # ============================================================================
  report:
    name: Validation Report
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [preflight, e2e-kind, e2e-hypershift]
    if: always()

    steps:
      - name: Determine overall result
        id: result
        run: |
          KIND_RESULT="${{ needs.e2e-kind.result }}"
          HYPERSHIFT_RESULT="${{ needs.e2e-hypershift.result }}"
          SKIP_KIND="${{ inputs.skip_kind }}"
          SKIP_HYPERSHIFT="${{ inputs.skip_hypershift }}"
          REF="${{ needs.preflight.outputs.ref }}"

          echo "## RC Validation Report: \`${REF}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Platform | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|--------|" >> "$GITHUB_STEP_SUMMARY"

          FAILED=false

          if [ "$SKIP_KIND" = "true" ]; then
            echo "| Kind (K8s ${{ env.K8S_VERSION }}) | Skipped |" >> "$GITHUB_STEP_SUMMARY"
          elif [ "$KIND_RESULT" = "success" ]; then
            echo "| Kind (K8s ${{ env.K8S_VERSION }}) | Passed |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Kind (K8s ${{ env.K8S_VERSION }}) | FAILED (${KIND_RESULT}) |" >> "$GITHUB_STEP_SUMMARY"
            FAILED=true
          fi

          if [ "$SKIP_HYPERSHIFT" = "true" ]; then
            echo "| HyperShift (OCP ${{ env.OCP_VERSION }}) | Skipped |" >> "$GITHUB_STEP_SUMMARY"
          elif [ "$HYPERSHIFT_RESULT" = "success" ]; then
            echo "| HyperShift (OCP ${{ env.OCP_VERSION }}) | Passed |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| HyperShift (OCP ${{ env.OCP_VERSION }}) | FAILED (${HYPERSHIFT_RESULT}) |" >> "$GITHUB_STEP_SUMMARY"
            FAILED=true
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAILED" = "true" ]; then
            echo "### RC NOT ready for promotion" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Fix failures and re-run, or cut a new RC with the fix." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          else
            echo "### RC validated - ready for GA promotion" >> "$GITHUB_STEP_SUMMARY"
          fi
