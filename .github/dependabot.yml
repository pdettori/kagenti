version: 2
updates:
  # GitHub Actions — keep workflow actions up to date
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  # Python (root) — Ansible + E2E test dependencies
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  # Python (backend) — FastAPI backend dependencies
  - package-ecosystem: pip
    directory: /kagenti/backend
    schedule:
      interval: weekly
    labels:
      - dependencies
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  # npm (UI) — React frontend dependencies
  - package-ecosystem: npm
    directory: /kagenti/ui-v2
    schedule:
      interval: weekly
    labels:
      - dependencies
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    ignore:
      # PatternFly packages must be upgraded together (PF5→PF6).
      # Block major version bumps to prevent partial upgrades.
      - dependency-name: "@patternfly/*"
        update-types: [version-update:semver-major]

  # Go (TUI) — Go module dependencies
  - package-ecosystem: gomod
    directory: /kagenti/tui
    schedule:
      interval: weekly
    labels:
      - dependencies
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  # Docker — CI support images
  - package-ecosystem: docker
    directory: /.github/dockerfiles/hypershift-ci
    schedule:
      interval: weekly
    labels:
      - dependencies
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: docker
    directory: /.github/dockerfiles/postgres
    schedule:
      interval: weekly
    labels:
      - dependencies
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: docker
    directory: /.github/dockerfiles/python12
    schedule:
      interval: weekly
    labels:
      - dependencies
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  # Docker — application images
  - package-ecosystem: docker
    directory: /kagenti/backend
    schedule:
      interval: weekly
    labels:
      - dependencies
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: docker
    directory: /kagenti/ui-v2
    schedule:
      interval: weekly
    labels:
      - dependencies
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: docker
    directory: /kagenti/auth/agent-oauth-secret
    schedule:
      interval: weekly
    labels:
      - dependencies
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: docker
    directory: /kagenti/auth/api-oauth-secret
    schedule:
      interval: weekly
    labels:
      - dependencies
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: docker
    directory: /kagenti/auth/mlflow-oauth-secret
    schedule:
      interval: weekly
    labels:
      - dependencies
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: docker
    directory: /kagenti/auth/ui-oauth-secret
    schedule:
      interval: weekly
    labels:
      - dependencies
    groups:
      minor-and-patch:
        update-types: [minor, patch]
