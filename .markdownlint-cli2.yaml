# markdownlint-cli2 configuration
# https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md

config:
  # Disable line length — many existing docs have long lines
  MD013: false

  # Allow inline HTML — used for <details>/<summary>, <br>, <img> tags
  MD033: false

  # Allow non-H1 first line — files may start with YAML frontmatter or badges
  MD041: false

  # Allow duplicate headings in different nesting contexts (e.g., multiple "Prerequisites")
  MD024:
    siblings_only: true

  # Allow trailing punctuation in headings (e.g., "4.18 → 4.19")
  MD026: false

  # Disable rules that fire extensively on pre-existing docs.
  # These can be re-enabled iteratively as files are cleaned up.
  MD007: false  # Unordered list indentation (existing docs use 3-space indent)
  MD022: false  # Headings should be surrounded by blank lines
  MD031: false  # Fenced code blocks should be surrounded by blank lines
  MD032: false  # Lists should be surrounded by blank lines
  MD040: false  # Fenced code blocks should have a language specified
  MD060: false  # Table column count

# Ignore generated and vendored content
ignores:
  - "node_modules/**"
  - "venv/**"
  - "**/vendor/**"
  - "charts/**"
  - ".claude/**"
