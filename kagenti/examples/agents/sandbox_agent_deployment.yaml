# Deployment manifest for sandbox-agent (basic variant)
# Same image as sandbox-legion but without session persistence.
# Uses InMemoryTaskStore + MemorySaver (no postgres required).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-agent
  namespace: team1
  labels:
    kagenti.io/type: agent
    kagenti.io/protocol: a2a
    kagenti.io/framework: LangGraph
    kagenti.io/workload-type: deployment
    app.kubernetes.io/name: sandbox-agent
    app.kubernetes.io/managed-by: kagenti-e2e
    app.kubernetes.io/component: agent
  annotations:
    kagenti.io/description: "Basic sandbox agent with per-context workspace isolation (stateless)"
spec:
  replicas: 1
  selector:
    matchLabels:
      kagenti.io/type: agent
      app.kubernetes.io/name: sandbox-agent
  template:
    metadata:
      labels:
        kagenti.io/type: agent
        kagenti.io/protocol: a2a
        kagenti.io/framework: LangGraph
        app.kubernetes.io/name: sandbox-agent
    spec:
      containers:
      - name: agent
        image: image-registry.openshift-image-registry.svc:5000/team1/sandbox-agent:v0.0.1
        imagePullPolicy: Always
        env:
        - name: PORT
          value: "8000"
        - name: HOST
          value: "0.0.0.0"
        - name: WORKSPACE_ROOT
          value: "/workspace"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector.kagenti-system.svc.cluster.local:8335"
        - name: LLM_API_BASE
          value: "http://llm-budget-proxy.team1.svc:8080/v1"
        - name: LLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: litellm-virtual-keys
              key: api-key
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: litellm-virtual-keys
              key: api-key
        - name: LLM_MODEL
          value: "llama-4-scout"
        - name: UV_CACHE_DIR
          value: "/app/.cache/uv"
        - name: GH_TOKEN
          valueFrom:
            secretKeyRef:
              name: github-token-secret
              key: token
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi
        volumeMounts:
        - name: workspace
          mountPath: /workspace
        - name: cache
          mountPath: /app/.cache
      volumes:
      - name: workspace
        emptyDir:
          sizeLimit: 5Gi
      - name: cache
        emptyDir: {}
