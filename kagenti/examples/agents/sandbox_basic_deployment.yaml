# Deployment manifest for sandbox-basic
# Hardened security (same as sandbox-hardened) but no checkpoint persistence.
# Uses InMemoryTaskStore for task state, PostgreSQL for A2A task store only.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-basic
  namespace: team1
  labels:
    kagenti.io/type: agent
    kagenti.io/protocol: a2a
    kagenti.io/framework: LangGraph
    kagenti.io/workload-type: deployment
    app.kubernetes.io/name: sandbox-basic
    app.kubernetes.io/managed-by: kagenti-e2e
    app.kubernetes.io/component: agent
  annotations:
    kagenti.io/description: "Basic sandbox agent - hardened security, no checkpoint persistence"
    kagenti.io/isolation-mode: shared
spec:
  replicas: 1
  selector:
    matchLabels:
      kagenti.io/type: agent
      app.kubernetes.io/name: sandbox-basic
  template:
    metadata:
      labels:
        kagenti.io/type: agent
        kagenti.io/protocol: a2a
        kagenti.io/framework: LangGraph
        app.kubernetes.io/name: sandbox-basic
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: agent
        image: image-registry.openshift-image-registry.svc:5000/team1/sandbox-agent:v0.0.1
        imagePullPolicy: Always
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
        env:
        - name: PORT
          value: "8000"
        - name: HOST
          value: "0.0.0.0"
        - name: WORKSPACE_ROOT
          value: "/workspace"
        - name: LLM_API_BASE
          value: "http://llm-budget-proxy.team1.svc:8080/v1"
        - name: LLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: litellm-virtual-keys
              key: api-key
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: litellm-virtual-keys
              key: api-key
        - name: LLM_MODEL
          value: "llama-4-scout"
        - name: UV_CACHE_DIR
          value: "/app/.cache/uv"
        - name: GH_TOKEN
          valueFrom:
            secretKeyRef:
              name: github-token-secret
              key: token
        - name: TASK_STORE_DB_URL
          value: "postgresql+psycopg://kagenti:kagenti-sessions-dev@postgres-sessions.team1:5432/sessions?sslmode=disable"
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi
        volumeMounts:
        - name: workspace
          mountPath: /workspace
        - name: cache
          mountPath: /app/.cache
      volumes:
      - name: workspace
        emptyDir:
          sizeLimit: 5Gi
      - name: cache
        emptyDir: {}
