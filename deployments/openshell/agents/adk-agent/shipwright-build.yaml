# Shipwright Build for ADK agent (OpenShell PoC)
# Builds on-cluster using the internal registry
apiVersion: shipwright.io/v1beta1
kind: Build
metadata:
  name: adk-agent
  namespace: team1
  labels:
    kagenti.io/type: agent
    app.kubernetes.io/name: adk-agent
spec:
  source:
    type: Git
    git:
      url: https://github.com/kagenti/kagenti
      revision: feat/openshell-poc
    contextDir: deployments/openshell/agents/adk-agent
  strategy:
    name: buildah
    kind: ClusterBuildStrategy
  output:
    image: image-registry.openshift-image-registry.svc:5000/team1/adk-agent:latest
    pushSecret: builder-dockercfg
