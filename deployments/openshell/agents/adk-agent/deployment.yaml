# ADK Agent — OpenShell PoC
#
# Google ADK-based PR review agent with A2A protocol support.
# Uses the Budget Proxy for LLM access (OpenAI-compatible endpoint).
#
# Build:   docker build -t adk-agent:latest deployments/openshell/agents/adk-agent/
# Deploy:  kubectl apply -f deployments/openshell/agents/adk-agent/deployment.yaml
# Destroy: kubectl delete -f deployments/openshell/agents/adk-agent/deployment.yaml
---
# ConfigMap created by openshell-build-agents.sh from policy-data.yaml + sandbox-policy.rego
# Not inlined here to avoid wildcard policy validation errors
---
# 2. Deployment — ADK agent pod
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adk-agent
  namespace: team1
  labels:
    kagenti.io/type: agent
    protocol.kagenti.io/a2a: ""
    kagenti.io/framework: GoogleADK
    kagenti.io/workload-type: deployment
    app.kubernetes.io/name: adk-agent
    app.kubernetes.io/managed-by: openshell
    app.kubernetes.io/component: agent
  annotations:
    kagenti.io/description: "PR review agent (Google ADK) supervised by OpenShell (PoC)"
    openshell.kagenti.io/policy: adk-agent-policy
spec:
  replicas: 1
  selector:
    matchLabels:
      kagenti.io/type: agent
      app.kubernetes.io/name: adk-agent
  template:
    metadata:
      labels:
        kagenti.io/type: agent
        protocol.kagenti.io/a2a: ""
        kagenti.io/framework: GoogleADK
        app.kubernetes.io/name: adk-agent
    spec:
      containers:
      - name: agent
        image: adk-agent:latest
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        env:
        - name: AGENT_NAME
          value: "adk-agent"
        - name: PORT
          value: "8080"
        # LiteLlm model string — routed through the Budget Proxy
        - name: LLM_MODEL
          value: "openai/llama-4-scout"
        # Point LiteLlm's OpenAI provider at the Budget Proxy
        - name: OPENAI_API_BASE
          value: "http://llm-budget-proxy.team1.svc:8080/v1"
        # Virtual key from the namespace secret
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: litellm-virtual-keys
              key: api-key
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 12
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: policy
          mountPath: /etc/openshell
          readOnly: true
        - name: cache
          mountPath: /app/.cache
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: policy
        configMap:
          name: adk-agent-policy
      - name: cache
        emptyDir: {}
      - name: tmp
        emptyDir: {}
---
# 3. Service — ClusterIP on port 8080
apiVersion: v1
kind: Service
metadata:
  name: adk-agent
  namespace: team1
  labels:
    kagenti.io/type: agent
    protocol.kagenti.io/a2a: ""
    app.kubernetes.io/name: adk-agent
    app.kubernetes.io/managed-by: openshell
spec:
  type: ClusterIP
  selector:
    kagenti.io/type: agent
    app.kubernetes.io/name: adk-agent
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
---
# 4. AgentRuntime CR — declares this deployment as a Kagenti-managed agent
#    Requires the agent.kagenti.dev CRD to be installed (kagenti-operator).
apiVersion: agent.kagenti.dev/v1alpha1
kind: AgentRuntime
metadata:
  name: adk-agent
  namespace: team1
  labels:
    app.kubernetes.io/name: adk-agent
    app.kubernetes.io/managed-by: openshell
spec:
  type: agent
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: adk-agent
