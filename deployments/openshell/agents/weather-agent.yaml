# Weather Agent — OpenShell PoC
#
# Deploys the weather-service A2A agent into team1 with an OPA policy
# ConfigMap for future OpenShell supervisor integration.
#
# Deploy:  kubectl apply -f deployments/openshell/agents/weather-agent.yaml
# Destroy: kubectl delete -f deployments/openshell/agents/weather-agent.yaml
---
# 1. OPA sandbox policy consumed by the OpenShell supervisor
apiVersion: v1
kind: ConfigMap
metadata:
  name: weather-agent-policy
  namespace: team1
  labels:
    app.kubernetes.io/name: weather-agent
    app.kubernetes.io/component: policy
    app.kubernetes.io/managed-by: openshell
data:
  policy.yaml: |
    version: 1
    filesystem_policy:
      include_workdir: true
      read_only:
        - /usr
        - /lib
        - /etc
        - /app
      read_write:
        - /tmp
    process:
      run_as_user: sandbox
      run_as_group: sandbox
    network_policies:
      internal:
        name: "Allow internal cluster services"
        endpoints:
          - host: "*.svc.cluster.local"
            port: 8080
          - host: "*.svc.cluster.local"
            port: 443
      weather_api:
        name: "Allow Open-Meteo weather API"
        endpoints:
          - host: "api.open-meteo.com"
            port: 443
---
# 2. Deployment — standard agent pod (supervisor entrypoint deferred to
#    a later step when the supervisor image is available)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-agent
  namespace: team1
  labels:
    kagenti.io/type: agent
    protocol.kagenti.io/a2a: ""
    kagenti.io/framework: LangGraph
    kagenti.io/workload-type: deployment
    app.kubernetes.io/name: weather-agent
    app.kubernetes.io/managed-by: openshell
    app.kubernetes.io/component: agent
  annotations:
    kagenti.io/description: "Weather agent supervised by OpenShell (PoC)"
    openshell.kagenti.io/policy: weather-agent-policy
spec:
  replicas: 1
  selector:
    matchLabels:
      kagenti.io/type: agent
      app.kubernetes.io/name: weather-agent
  template:
    metadata:
      labels:
        kagenti.io/type: agent
        protocol.kagenti.io/a2a: ""
        kagenti.io/framework: LangGraph
        app.kubernetes.io/name: weather-agent
    spec:
      containers:
      - name: agent
        image: ghcr.io/kagenti/agent-examples/weather_service:latest
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        env:
        - name: AGENT_NAME
          value: "weather-agent"
        - name: PORT
          value: "8080"
        - name: HOST
          value: "0.0.0.0"
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 12
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: policy
          mountPath: /etc/openshell
          readOnly: true
        - name: cache
          mountPath: /.cache
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: policy
        configMap:
          name: weather-agent-policy
      - name: cache
        emptyDir: {}
      - name: tmp
        emptyDir: {}
---
# 3. Service — ClusterIP on port 8080
apiVersion: v1
kind: Service
metadata:
  name: weather-agent
  namespace: team1
  labels:
    kagenti.io/type: agent
    protocol.kagenti.io/a2a: ""
    app.kubernetes.io/name: weather-agent
    app.kubernetes.io/managed-by: openshell
spec:
  type: ClusterIP
  selector:
    kagenti.io/type: agent
    app.kubernetes.io/name: weather-agent
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
---
# 4. AgentRuntime CR — declares this deployment as a Kagenti-managed agent
#    Requires the agent.kagenti.dev CRD to be installed (kagenti-operator).
apiVersion: agent.kagenti.dev/v1alpha1
kind: AgentRuntime
metadata:
  name: weather-agent
  namespace: team1
  labels:
    app.kubernetes.io/name: weather-agent
    app.kubernetes.io/managed-by: openshell
spec:
  type: agent
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: weather-agent
