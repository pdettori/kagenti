# ADK agent with OpenShell supervisor — Tier 2 (LLM + security)
# Tests skill execution under full supervisor security layers
#
# Policy ConfigMap created by fulltest script from:
#   policy-data.yaml (sandbox config)
#   sandbox-policy.rego (OPA rules)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adk-agent-supervised
  namespace: team1
  labels:
    kagenti.io/type: agent
    app.kubernetes.io/name: adk-agent-supervised
    app.kubernetes.io/managed-by: openshell
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: adk-agent-supervised
  template:
    metadata:
      labels:
        kagenti.io/type: agent
        kagenti.io/inject: disabled
        app.kubernetes.io/name: adk-agent-supervised
    spec:
      serviceAccountName: openshell-supervisor
      containers:
      - name: agent
        image: adk-agent-supervised:latest
        imagePullPolicy: IfNotPresent
        command: ["/usr/local/bin/openshell-sandbox"]
        args:
        - "--policy-rules"
        - "/etc/openshell/sandbox-policy.rego"
        - "--policy-data"
        - "/etc/openshell/policy.yaml"
        - "--log-level"
        - "info"
        - "--"
        - "python"
        - "agent.py"
        securityContext:
          privileged: true
        env:
        - name: AGENT_NAME
          value: "adk-agent-supervised"
        - name: PORT
          value: "8080"
        - name: HOST
          value: "0.0.0.0"
        - name: LLM_MODEL
          value: "openai/gpt-4o-mini"
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: litellm-virtual-keys
              key: api-key
        - name: OPENAI_API_BASE
          value: "http://litellm-model-proxy.team1.svc:4000/v1"
        volumeMounts:
        - name: policy
          mountPath: /etc/openshell
          readOnly: true
        - name: tmp
          mountPath: /tmp
      # Bridges traffic from the pod network (default netns) into the
      # supervisor's isolated network namespace where the agent listens.
      - name: port-bridge
        image: alpine/socat:1.8.0.1
        args:
        - "TCP-LISTEN:8080,fork,reuseaddr"
        - "TCP:10.200.0.2:8080"
        ports:
        - containerPort: 8080
        securityContext:
          runAsNonRoot: true
          runAsUser: 65534
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
      volumes:
      - name: policy
        configMap:
          name: adk-agent-supervised-policy
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: adk-agent-supervised
  namespace: team1
spec:
  selector:
    app.kubernetes.io/name: adk-agent-supervised
  ports:
  - port: 8080
    targetPort: 8080
