# OpenShell Gateway RBAC
# The gateway needs permissions to manage Sandbox CRDs and supporting
# resources (pods, secrets, configmaps) in agent namespaces.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openshell-gateway
  namespace: openshell-system
  labels:
    app.kubernetes.io/name: openshell-gateway
    app.kubernetes.io/part-of: kagenti
    app.kubernetes.io/component: openshell
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openshell-gateway
  labels:
    app.kubernetes.io/name: openshell-gateway
    app.kubernetes.io/part-of: kagenti
    app.kubernetes.io/component: openshell
rules:
# Sandbox CRD management
- apiGroups:
  - agents.x-k8s.io
  resources:
  - sandboxes
  - sandboxes/status
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
# Pod lifecycle for sandbox execution
- apiGroups:
  - ""
  resources:
  - pods
  - pods/log
  - pods/exec
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
# Secrets for agent credentials and TLS
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
# ConfigMaps for sandbox configuration
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
# Events for status reporting and watching
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - get
  - list
  - watch
  - create
  - patch
# Services for sandbox networking
- apiGroups:
  - ""
  resources:
  - services
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - delete
# Namespaces (read-only)
- apiGroups:
  - ""
  resources:
  - namespaces
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openshell-gateway
  labels:
    app.kubernetes.io/name: openshell-gateway
    app.kubernetes.io/part-of: kagenti
    app.kubernetes.io/component: openshell
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openshell-gateway
subjects:
- kind: ServiceAccount
  name: openshell-gateway
  namespace: openshell-system
