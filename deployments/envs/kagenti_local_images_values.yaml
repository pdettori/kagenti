# Helm values file for local image overrides
# This file is referenced by dev_values_local_images.yaml as a values_file
# and is passed directly to Helm (bypassing Ansible's values filtering)

# Override SPIFFE IdP setup image
spiffeIdp:
  image:
    repository: ghcr.io/kagenti/kagenti/spiffe-idp-setup
    tag: local
    pullPolicy: Never

# Override AuthBridge sidecar images
authBridge:
  images:
    clientRegistration:
      tag: local
      pullPolicy: Never
    envoyProxy:
      tag: local
      pullPolicy: Never
    proxyInit:
      tag: local
      pullPolicy: Never

# Override component settings
components:
  platformWebhook:
    image:
      repository: ghcr.io/kagenti/kagenti-extensions/kagenti-webhook
      tag: local
      pullPolicy: Never
  # Disable mcpGateway component (avoid mcp-system namespace issue)
  mcpGateway:
    enabled: false
