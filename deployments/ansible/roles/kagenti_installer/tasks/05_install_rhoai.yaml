# Wait for RHOAI operator and DataScienceCluster readiness
#
# The RHOAI operator subscription is created by the kagenti-deps Helm chart.
# This task handles:
# 1. Waiting for the operator CSV to reach Succeeded state
# 2. Waiting for the DataScienceCluster CRD to be available
# 3. Creating the DataScienceCluster CR (since Helm hook can't create it on fresh installs)
# 4. Waiting for the DataScienceCluster to reach Ready state
#
# Variables (from values files):
#   rhoai.enabled: true/false
#   rhoai.profile: minimal/full
#   rhoai.kserve_mode: raw/serverless

- name: Wait for RHOAI operator and create DataScienceCluster
  block:
    - name: Wait for RHOAI operator CSV to succeed
      shell: |
        for i in $(seq 1 60); do
          csv=$(kubectl get csv -n redhat-ods-operator -o jsonpath='{.items[?(@.spec.displayName=="Red Hat OpenShift AI")].status.phase}' 2>/dev/null)
          if [ "$csv" = "Succeeded" ]; then
            echo "RHOAI operator CSV succeeded"
            exit 0
          fi
          echo "Waiting for RHOAI CSV... ($i/60, status: $csv)"
          sleep 10
        done
        echo "ERROR: RHOAI operator CSV did not reach Succeeded state within 10 minutes"
        exit 1
      register: rhoai_csv_result

    - name: Verify RHOAI operator is version 3.x
      shell: |
        csv_version=$(kubectl get csv -n redhat-ods-operator -o jsonpath='{.items[?(@.spec.displayName=="Red Hat OpenShift AI")].spec.version}' 2>/dev/null)
        if [ -z "$csv_version" ]; then
          echo "WARNING: Could not determine RHOAI version"
          exit 0
        fi
        major=$(echo "$csv_version" | cut -d. -f1)
        if [ "$major" -lt 3 ] 2>/dev/null; then
          echo "ERROR: RHOAI version $csv_version is not 3.x. This installer requires RHOAI 3.x or later."
          echo "RHOAI 2.x uses sidecar-based Istio which requires the Shared Trust Pattern."
          exit 1
        fi
        echo "RHOAI version $csv_version confirmed (3.x)"
      register: rhoai_version_check

    - name: Wait for DataScienceCluster CRD to be available
      command: kubectl wait --for=condition=Established crd/datascienceclusters.datasciencecluster.opendatahub.io --timeout=120s

    - name: Validate RHOAI profile
      fail:
        msg: "Invalid rhoai.profile '{{ rhoai.profile }}'. Must be 'minimal' or 'full'."
      when: rhoai.profile | default('minimal') not in ['minimal', 'full']

    - name: "Create DataScienceCluster ({{ rhoai.profile | default('minimal') }} profile)"
      kubernetes.core.k8s:
        state: present
        template: "rhoai/dsc-{{ rhoai.profile | default('minimal') }}.yaml.j2"

    # Right-size RHOAI for test/dev clusters.
    # The RHOAI dashboard requests 2.5 CPU / 5Gi RAM per replica (4 sidecars including
    # oauth-proxy). The operator defaults to 3 replicas at 500m each. On small clusters
    # (2-3 nodes), this exhausts CPU and blocks other pods from scheduling.
    # Scale operator FIRST (prevents it from reconciling replicas back up), then dashboard.
    # Only runs when rhoai.scale_down is explicitly set to true.
    - name: Scale down RHOAI operator to 1 replica for test cluster
      command: kubectl scale deployment rhods-operator -n redhat-ods-operator --replicas=1
      failed_when: false
      changed_when: false
      when: (rhoai | default({})).get('scale_down', false) | bool

    - name: Scale down RHOAI dashboard for test cluster
      shell: |
        # Wait for dashboard deployment to exist (created by DSC reconciliation)
        for i in $(seq 1 30); do
          if kubectl get deployment rhods-dashboard -n redhat-ods-applications 2>/dev/null; then
            kubectl scale deployment rhods-dashboard -n redhat-ods-applications --replicas=1
            echo "Dashboard scaled to 1 replica"
            exit 0
          fi
          sleep 5
        done
        echo "Dashboard deployment not found (may not be created yet)"
      failed_when: false
      changed_when: false
      when: (rhoai | default({})).get('scale_down', false) | bool

    - name: Delete pending dashboard pods to free CPU
      shell: |
        kubectl delete pod -n redhat-ods-applications --field-selector=status.phase=Pending 2>/dev/null || true
        kubectl delete pod -n redhat-ods-operator --field-selector=status.phase=Pending 2>/dev/null || true
      failed_when: false
      changed_when: false
      when: (rhoai | default({})).get('scale_down', false) | bool

    - name: Wait for DataScienceCluster to be Ready
      shell: |
        for i in $(seq 1 90); do
          phase=$(kubectl get datasciencecluster default-dsc -o jsonpath='{.status.phase}' 2>/dev/null)
          if [ "$phase" = "Ready" ]; then
            echo "DataScienceCluster is Ready"
            exit 0
          fi
          echo "Waiting for DSC... ($i/90, phase: $phase)"
          sleep 10
        done
        echo "ERROR: DataScienceCluster did not reach Ready state within 15 minutes"
        exit 1
      register: dsc_ready_result

    # --- Shared Trust: cert-manager CA → Istio cacerts format ---
    # cert-manager generates intermediate CA certs with keys tls.crt/tls.key/ca.crt.
    # Istio expects a secret named "cacerts" with keys ca-cert.pem/ca-key.pem/
    # root-cert.pem/cert-chain.pem. Transform and create.
    #
    # The Helm template may have skipped creating these resources if cert-manager
    # CRDs weren't available at chart install time. Create them now as a fallback.

    - name: Ensure cert-manager CRDs are available
      command: kubectl get crd certificates.cert-manager.io
      register: certmanager_crd_ready
      retries: 30
      delay: 10
      until: certmanager_crd_ready.rc == 0
      changed_when: false

    - name: Wait for cert-manager webhook to be ready
      command: >-
        kubectl rollout status deployment/cert-manager-webhook
        -n cert-manager --timeout=60s
      register: certmanager_webhook_ready
      retries: 12
      delay: 15
      until: certmanager_webhook_ready.rc == 0

    - name: Create shared trust cert-manager resources (fallback if Helm skipped)
      shell: |
        kubectl apply -f - <<'EOF'
        apiVersion: cert-manager.io/v1
        kind: ClusterIssuer
        metadata:
          name: istio-mesh-root-selfsigned
        spec:
          selfSigned: {}
        ---
        apiVersion: cert-manager.io/v1
        kind: Certificate
        metadata:
          name: istio-mesh-root-ca
          namespace: cert-manager
        spec:
          isCA: true
          commonName: istio-mesh-root-ca
          duration: 87600h
          renewBefore: 720h
          secretName: istio-mesh-root-ca-secret
          privateKey:
            algorithm: RSA
            size: 4096
          issuerRef:
            name: istio-mesh-root-selfsigned
            kind: ClusterIssuer
        EOF
      args:
        executable: /bin/bash

    - name: Wait for root CA secret to be ready
      command: >-
        kubectl get secret istio-mesh-root-ca-secret -n cert-manager
        -o jsonpath='{.data.tls\.crt}'
      register: root_ca_ready
      retries: 30
      delay: 10
      until: root_ca_ready.rc == 0 and root_ca_ready.stdout | length > 0
      changed_when: false

    - name: Create CA ClusterIssuer and intermediate certificates
      shell: |
        kubectl apply -f - <<'EOF'
        apiVersion: cert-manager.io/v1
        kind: ClusterIssuer
        metadata:
          name: istio-mesh-ca
        spec:
          ca:
            secretName: istio-mesh-root-ca-secret
        ---
        apiVersion: cert-manager.io/v1
        kind: Certificate
        metadata:
          name: istio-cacerts-default
          namespace: istio-system
        spec:
          isCA: true
          commonName: istio-ca-default
          duration: 8760h
          renewBefore: 720h
          secretName: istio-cacerts-default-cert
          privateKey:
            algorithm: RSA
            size: 2048
          issuerRef:
            name: istio-mesh-ca
            kind: ClusterIssuer
        ---
        apiVersion: cert-manager.io/v1
        kind: Certificate
        metadata:
          name: istio-cacerts-openshift-gateway
          namespace: openshift-ingress
        spec:
          isCA: true
          commonName: istio-ca-openshift-gateway
          duration: 8760h
          renewBefore: 720h
          secretName: istio-cacerts-og-cert
          privateKey:
            algorithm: RSA
            size: 2048
          issuerRef:
            name: istio-mesh-ca
            kind: ClusterIssuer
        EOF
      args:
        executable: /bin/bash

    - name: Wait for cert-manager to generate Kagenti intermediate CA
      command: >-
        kubectl get secret istio-cacerts-default-cert -n istio-system
        -o jsonpath='{.data.tls\.crt}'
      register: kagenti_cacert_check
      retries: 30
      delay: 10
      until: kagenti_cacert_check.rc == 0 and kagenti_cacert_check.stdout | length > 0
      changed_when: false

    - name: Wait for cert-manager to generate RHOAI intermediate CA
      command: >-
        kubectl get secret istio-cacerts-og-cert -n openshift-ingress
        -o jsonpath='{.data.tls\.crt}'
      register: rhoai_cacert_check
      retries: 30
      delay: 10
      until: rhoai_cacert_check.rc == 0 and rhoai_cacert_check.stdout | length > 0
      changed_when: false

    # When the root CA is regenerated (e.g. after Helm reinstall), cert-manager
    # does NOT re-sign existing valid intermediates. Detect the mismatch and
    # force re-issuance by deleting stale intermediate secrets.
    - name: Get current root CA fingerprint
      shell: >-
        kubectl get secret istio-mesh-root-ca-secret -n cert-manager
        -o jsonpath='{.data.tls\.crt}' | base64 -d |
        openssl x509 -noout -fingerprint -sha256 2>/dev/null |
        sed 's/.*=//'
      register: root_ca_fingerprint
      args:
        executable: /bin/bash

    - name: Check intermediate CA root consistency
      shell: |
        ROOT_FP="{{ root_ca_fingerprint.stdout }}"
        CHANGED=false
        for item in "istio-cacerts-default-cert:istio-system" "istio-cacerts-og-cert:openshift-ingress"; do
          SECRET="${item%%:*}"
          NS="${item##*:}"
          INTER_FP=$(kubectl get secret "$SECRET" -n "$NS" \
            -o jsonpath='{.data.ca\.crt}' | base64 -d | \
            openssl x509 -noout -fingerprint -sha256 2>/dev/null | sed 's/.*=//')
          if [ "$ROOT_FP" != "$INTER_FP" ]; then
            echo "Root CA mismatch in $NS/$SECRET — forcing re-issuance"
            kubectl delete secret "$SECRET" -n "$NS"
            CHANGED=true
          fi
        done
        echo "$CHANGED"
      register: ca_consistency_check
      args:
        executable: /bin/bash

    - name: Wait for re-issued Kagenti intermediate CA
      command: >-
        kubectl get secret istio-cacerts-default-cert -n istio-system
        -o jsonpath='{.data.tls\.crt}'
      register: kagenti_reissued
      retries: 30
      delay: 10
      until: kagenti_reissued.rc == 0 and kagenti_reissued.stdout | length > 0
      changed_when: false
      when: "'true' in ca_consistency_check.stdout"

    - name: Wait for re-issued RHOAI intermediate CA
      command: >-
        kubectl get secret istio-cacerts-og-cert -n openshift-ingress
        -o jsonpath='{.data.tls\.crt}'
      register: rhoai_reissued
      retries: 30
      delay: 10
      until: rhoai_reissued.rc == 0 and rhoai_reissued.stdout | length > 0
      changed_when: false
      when: "'true' in ca_consistency_check.stdout"

    - name: Create cacerts secret for Kagenti istiod (istio-system)
      shell: |
        CA_CERT=$(kubectl get secret istio-cacerts-default-cert -n istio-system -o jsonpath='{.data.tls\.crt}' | base64 -d)
        CA_KEY=$(kubectl get secret istio-cacerts-default-cert -n istio-system -o jsonpath='{.data.tls\.key}' | base64 -d)
        ROOT_CERT=$(kubectl get secret istio-cacerts-default-cert -n istio-system -o jsonpath='{.data.ca\.crt}' | base64 -d)
        CERT_CHAIN="${CA_CERT}
        ${ROOT_CERT}"
        kubectl create secret generic cacerts -n istio-system \
          --from-literal=ca-cert.pem="${CA_CERT}" \
          --from-literal=ca-key.pem="${CA_KEY}" \
          --from-literal=root-cert.pem="${ROOT_CERT}" \
          --from-literal=cert-chain.pem="${CERT_CHAIN}" \
          --dry-run=client -o yaml | kubectl apply -f -
      args:
        executable: /bin/bash

    - name: Create cacerts secret for RHOAI istiod (openshift-ingress)
      shell: |
        CA_CERT=$(kubectl get secret istio-cacerts-og-cert -n openshift-ingress -o jsonpath='{.data.tls\.crt}' | base64 -d)
        CA_KEY=$(kubectl get secret istio-cacerts-og-cert -n openshift-ingress -o jsonpath='{.data.tls\.key}' | base64 -d)
        ROOT_CERT=$(kubectl get secret istio-cacerts-og-cert -n openshift-ingress -o jsonpath='{.data.ca\.crt}' | base64 -d)
        CERT_CHAIN="${CA_CERT}
        ${ROOT_CERT}"
        kubectl create secret generic cacerts -n openshift-ingress \
          --from-literal=ca-cert.pem="${CA_CERT}" \
          --from-literal=ca-key.pem="${CA_KEY}" \
          --from-literal=root-cert.pem="${ROOT_CERT}" \
          --from-literal=cert-chain.pem="${CERT_CHAIN}" \
          --dry-run=client -o yaml | kubectl apply -f -
      args:
        executable: /bin/bash

    - name: Check if Kagenti istiod deployment exists
      command: kubectl get deployment/istiod -n istio-system --no-headers
      register: kagenti_istiod_exists
      failed_when: false
      changed_when: false

    - name: Restart Kagenti istiod to pick up shared CA
      command: kubectl rollout restart deployment/istiod -n istio-system
      when: kagenti_istiod_exists.rc == 0

    - name: Restart RHOAI istiod to pick up shared CA
      command: kubectl rollout restart deployment/istiod-openshift-gateway -n openshift-ingress
      failed_when: false

    - name: Wait for Kagenti istiod rollout
      command: kubectl rollout status deployment/istiod -n istio-system --timeout=300s
      register: kagenti_istiod_rollout
      retries: 3
      delay: 30
      until: kagenti_istiod_rollout.rc == 0
      when: kagenti_istiod_exists.rc == 0

    - name: Warn if Kagenti istiod not found for shared CA restart
      debug:
        msg: >-
          WARNING: deployment/istiod not found in istio-system.
          The kagenti-deps Helm post-install hooks may not have created the Istio CR.
          Check 'helm history kagenti-deps -n kagenti-system' for errors.
      when: kagenti_istiod_exists.rc != 0

    - name: Wait for RHOAI istiod rollout
      command: kubectl rollout status deployment/istiod-openshift-gateway -n openshift-ingress --timeout=300s
      register: rhoai_istiod_rollout
      retries: 3
      delay: 30
      until: rhoai_istiod_rollout.rc == 0
      failed_when: false

    - name: Delete stale CA ConfigMaps to force recreation with shared CA
      shell: |
        for ns in kagenti-system gateway-system team1 team2 keycloak mcp-system istio-system istio-ztunnel; do
          kubectl delete configmap istio-ca-root-cert -n $ns --ignore-not-found 2>/dev/null
        done
      args:
        executable: /bin/bash
      failed_when: false

    - name: Restart ztunnel to pick up shared CA
      command: kubectl rollout restart daemonset/ztunnel -n istio-ztunnel
      failed_when: false

    - name: Wait for ztunnel rollout
      command: kubectl rollout status daemonset/ztunnel -n istio-ztunnel --timeout=300s
      failed_when: false

  when: rhoai.enabled | default(false)
