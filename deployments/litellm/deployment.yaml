apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-proxy
  namespace: kagenti-system
  labels:
    app.kubernetes.io/name: litellm-proxy
    app.kubernetes.io/component: model-gateway
    app.kubernetes.io/part-of: kagenti
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm-proxy
        app.kubernetes.io/component: model-gateway
        istio.io/dataplane-mode: ambient
        istio.io/use-waypoint: waypoint
    spec:
      serviceAccountName: litellm-proxy
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: litellm
        # TODO(#1126): Build custom LiteLLM image to remove anyuid SCC requirement
        # /root/.cache to a non-root path, so we can drop the anyuid SCC.
        image: ghcr.io/berriai/litellm-database:main-v1.63.14-stable
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
        args:
        - --config
        - /app/config.yaml
        - --port
        - "4000"
        ports:
        - containerPort: 4000
          name: http
          protocol: TCP
        env:
        - name: LITELLM_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: litellm-proxy-secret
              key: master-key
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: litellm-proxy-secret
              key: database-url
        - name: STORE_MODEL_IN_DB
          value: "True"
        - name: LITELLM_LOG
          value: "DEBUG"
        envFrom:
        - secretRef:
            name: litellm-model-keys
        volumeMounts:
        - name: config
          mountPath: /app/config.yaml
          subPath: config.yaml
          readOnly: true
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /root/.cache
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi
        readinessProbe:
          httpGet:
            path: /health/readiness
            port: 4000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /health/liveliness
            port: 4000
          initialDelaySeconds: 45
          periodSeconds: 30
          timeoutSeconds: 5
      volumes:
      - name: config
        configMap:
          name: litellm-config
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir: {}
