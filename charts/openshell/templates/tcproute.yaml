{{- if eq .Values.ingress.type "istio" }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: openshell
  namespace: {{ .Values.tenant }}
  labels:
    {{- include "openshell.labels" . | nindent 4 }}
spec:
  gatewayClassName: istio
  listeners:
    - name: openshell-grpc
      port: {{ .Values.ingress.port }}
      protocol: TLS
      tls:
        mode: Passthrough
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: openshell
  namespace: {{ .Values.tenant }}
  labels:
    {{- include "openshell.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: openshell
  rules:
    - backendRefs:
        - name: openshell-server
          port: 8080
{{- end }}
