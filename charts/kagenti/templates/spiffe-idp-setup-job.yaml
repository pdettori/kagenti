{{- if and .Values.components.keycloak.enabled .Values.spire.enabled }}
---
# ServiceAccount for the SPIFFE IdP Setup Job
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kagenti-spiffe-idp-setup
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kagenti.labels" . | nindent 4 }}
---
# ClusterRole for reading Keycloak secrets
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kagenti-spiffe-idp-reader
  labels:
    {{- include "kagenti.labels" . | nindent 4 }}
rules:
  # Permission to READ the Keycloak admin secret
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: [{{ .Values.keycloak.adminSecretName | quote }}]
    verbs: ["get"]
---
# RoleBinding for Keycloak namespace (Read Access)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kagenti-spiffe-idp-keycloak-reader
  namespace: {{ .Values.keycloak.namespace }}
  labels:
    {{- include "kagenti.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: kagenti-spiffe-idp-setup
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: kagenti-spiffe-idp-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kagenti-spiffe-idp-setup-job
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kagenti.labels" . | nindent 4 }}
  annotations:
    # Re-run the job on upgrades to ensure IdP config is current
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"  # Run after Keycloak is ready (weight 0) and agent-oauth-secret-job (weight 2)
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        app: kagenti-spiffe-idp-setup
    spec:
      serviceAccountName: kagenti-spiffe-idp-setup
      restartPolicy: OnFailure
      # Init container to wait for SPIRE server to be ready
      initContainers:
        - name: wait-for-spire
          image: {{ .Values.common.kubectlImage }}
          command:
            - sh
            - -c
            - |
              echo "Waiting for SPIRE server to be ready..."
              kubectl wait --for=condition=ready pod \
                -l app=spire-server \
                -n {{ .Values.spire.namespace | default "spire-server" }} \
                --timeout=300s
              echo "SPIRE server is ready"

              echo "Waiting for SPIRE OIDC discovery provider to be ready..."
              kubectl wait --for=condition=ready pod \
                -l app.kubernetes.io/name=spire-spiffe-oidc-discovery-provider \
                -n {{ .Values.spire.namespace | default "spire-server" }} \
                --timeout=300s
              echo "SPIRE OIDC discovery provider is ready"
      containers:
        - name: setup-spiffe-idp
          image: {{ .Values.spiffeIdp.image.repository }}:{{ .Values.spiffeIdp.image.tag | default "latest" }}
          imagePullPolicy: {{ .Values.spiffeIdp.image.pullPolicy | default "IfNotPresent" }}
          env:
            - name: KEYCLOAK_BASE_URL
              value: "{{ .Values.keycloak.url }}"
            - name: KEYCLOAK_REALM
              value: "{{ .Values.keycloak.realm }}"
            - name: KEYCLOAK_NAMESPACE
              value: "{{ .Values.keycloak.namespace }}"
            - name: KEYCLOAK_ADMIN_SECRET_NAME
              value: "{{ .Values.keycloak.adminSecretName }}"
            - name: KEYCLOAK_ADMIN_USERNAME_KEY
              value: "{{ .Values.keycloak.adminUsernameKey }}"
            - name: KEYCLOAK_ADMIN_PASSWORD_KEY
              value: "{{ .Values.keycloak.adminPasswordKey }}"
            - name: SPIFFE_TRUST_DOMAIN
              value: "spiffe://{{ .Values.domain }}"
            - name: SPIFFE_BUNDLE_ENDPOINT
              value: "http://spire-spiffe-oidc-discovery-provider.{{ .Values.spire.namespace | default "spire-server" }}.svc.cluster.local/keys"
            - name: SPIFFE_IDP_ALIAS
              value: "{{ .Values.authBridge.spiffeIdpAlias }}"
            - name: SPIRE_NAMESPACE
              value: "{{ .Values.spire.namespace | default "spire-server" }}"
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
{{- end }}
