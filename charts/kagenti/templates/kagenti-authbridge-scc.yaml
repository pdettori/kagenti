{{- if $.Values.openshift }}
# ——————————————————————————————————————————————————————————————————————————————
#  Custom SCC for AuthBridge sidecars in agent namespaces.
#
#  The kagenti-webhook injects an AuthBridge sidecar stack into agent pods:
#    - proxy-init (init): iptables traffic interception (needs NET_ADMIN/NET_RAW, root)
#    - envoy-proxy (sidecar): Envoy for auth token injection (UID 1337)
#    - spiffe-helper (sidecar): SPIRE identity (UID 1000)
#    - client-registration (sidecar): Keycloak registration (UID 1000)
#
#  This SCC grants exactly the permissions needed — no privileged mode.
#  Bound to agent namespaces via the `groups` field below.
#  Note: RBAC RoleBindings for SCC `use` verb are insufficient on some
#  OpenShift versions — the SCC admission controller requires direct
#  groups/users on the SCC object itself.
# ——————————————————————————————————————————————————————————————————————————————
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: kagenti-authbridge
  labels:
    {{- include "kagenti.labels" . | nindent 4 }}
groups:
{{- range $.Values.agentNamespaces }}
  - system:serviceaccounts:{{ . }}
{{- end }}
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
allowPrivilegedContainer: false
allowPrivilegeEscalation: true
allowedCapabilities:
  - NET_ADMIN
  - NET_RAW
defaultAddCapabilities: []
requiredDropCapabilities:
  - MKNOD
fsGroup:
  type: RunAsAny
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: MustRunAs
supplementalGroups:
  type: RunAsAny
# TODO: Replace '*' with explicit profiles once webhook seccomp behavior is stable.
# Track in kagenti-extensions — the webhook should declare which profiles it needs.
seccompProfiles:
  - runtime/default
  - '*'
volumes:
  - configMap
  - csi
  - downwardAPI
  - emptyDir
  - ephemeral
  - persistentVolumeClaim
  - projected
  - secret
---
# ——————————————————————————————————————————————————————————————————————————————
#  ClusterRole granting "use" on the kagenti-authbridge SCC.
#  OpenShift auto-creates ClusterRoles for built-in SCCs but may not do so
#  reliably for custom SCCs. Create it explicitly so RoleBindings work.
# ——————————————————————————————————————————————————————————————————————————————
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: system:openshift:scc:kagenti-authbridge
  labels:
    {{- include "kagenti.labels" . | nindent 4 }}
rules:
  - apiGroups: ["security.openshift.io"]
    resources: ["securitycontextconstraints"]
    resourceNames: ["kagenti-authbridge"]
    verbs: ["use"]
{{- end }}
