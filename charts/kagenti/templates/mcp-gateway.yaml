{{- if .Values.components.mcpGateway.enabled }}
# Gateway resource for mcp-gateway. The mcp-gateway controller (v0.6.0+)
# manages the broker-router deployment and routes automatically via the
# MCPGatewayExtension CR created by the mcp-gateway Helm chart.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: mcp-gateway
  namespace: "{{ .Values.mcpGateway.namespaces.gatewaySystem }}"
  annotations:
    networking.istio.io/service-type: ClusterIP
  labels:
    gateway.io/name: mcp-gateway
    istio: ingressgateway
    # Keep generated gateway pods out of ambient capture.
    istio.io/dataplane-mode: none
    {{- include "kagenti.labels" . | nindent 4 }}
spec:
  gatewayClassName: istio
  listeners:
    - name: mcp
      {{- if .Values.openshift }}
      hostname: "mcp-gateway-{{ .Values.mcpGateway.namespaces.gatewaySystem }}.{{ .Values.mcpGateway.openshiftDomain }}"
      {{- else }}
      hostname: "{{ .Values.mcpGateway.hostname }}"
      {{- end }}
      port: 8080
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: mcps
      port: 8080
      protocol: HTTP
      hostname: '*.mcp.local'
      allowedRoutes:
        namespaces:
          from: All
---
{{- if .Values.openshift }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: mcp-gateway
  namespace: "{{ .Values.mcpGateway.namespaces.gatewaySystem }}"
  labels:
    {{- include "kagenti.labels" . | nindent 4 }}
spec:
  tls:
    insecureEdgeTerminationPolicy: Redirect
    termination: edge
  port:
    targetPort: mcp
  to:
    kind: Service
    name: mcp-gateway-istio
    weight: 100
  wildcardPolicy: None
{{- end }}
{{- end }}
