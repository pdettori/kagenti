{{- if and  .Values.agentNamespaces  .Values.spire.enabled }}
{{- $root := . }}
{{- range $root.Values.agentNamespaces }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: spiffe-helper-config
  namespace: {{ . }}
  labels:
    {{- include "kagenti.labels" $root | nindent 4 }}
data:
  helper.conf: |
    agent_address = "/spiffe-workload-api/spire-agent.sock"
    cmd = ""
    cmd_args = ""
    svid_file_name = "/opt/svid.pem"
    svid_key_file_name = "/opt/svid_key.pem"
    svid_bundle_file_name = "/opt/svid_bundle.pem"
    # Certificates are public material — keep world-readable.
    # Private key is sensitive — restrict to owner + group.
    # fsGroup=0 on the pod ensures all sidecar containers share GID 0.
    cert_file_mode = 0644
    key_file_mode = 0640
    # jwt_audience MUST match Keycloak's issuer URL exactly (use publicUrl, not internal url)
    # The JWT-SVID's aud claim must match the "iss" claim in tokens issued by Keycloak
    jwt_svids = [{jwt_audience="{{ $root.Values.keycloak.publicUrl }}/realms/{{ $root.Values.keycloak.realm }}", jwt_svid_file_name="/opt/jwt_svid.token"}]
    jwt_svid_file_mode = 0644
    include_federated_domains = true
{{- end }}
{{- end }}